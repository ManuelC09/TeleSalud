{% extends "administrador/admon.html" %}
{% block title %}Iniciar Sesión{% endblock %}

{% block content %}

<section class="relative overflow-hidden">
  <!-- Background gradient -->
  <div class="absolute inset-0 bg-gradient-to-br from-slate-950 via-slate-900 to-slate-800"></div>

  <!-- Glow blobs -->
  <div class="absolute -top-40 -left-40 h-96 w-96 rounded-full bg-blue-600/20 blur-3xl"></div>
  <div class="absolute bottom-0 right-0 h-96 w-96 rounded-full bg-purple-600/20 blur-3xl"></div>

  <div class="relative mx-auto flex min-h-[calc(100vh-7rem)] max-w-screen-xl items-center justify-center px-4 py-16">
    <div class="w-full max-w-md rounded-3xl border border-white/10 bg-white/5 p-8 shadow-2xl backdrop-blur-xl">

      <!-- Header -->
      <div class="text-center">
        <h1 class="text-2xl md:text-3xl font-semibold tracking-tight text-white">
          Iniciar sesión (Admin)
        </h1>
        <p class="mt-2 text-sm text-slate-300">
          Ingresa tus credenciales para acceder al panel.
        </p>
      </div>

      <!-- Form -->
      <form action="{{ url_for('administrador.iniciarSesion') }}" method="POST" class="mt-8 space-y-4">

        <!-- Usuario -->
        <div>
          <label for="usuario" class="mb-2 block text-sm font-medium text-slate-200">
            Usuario
          </label>
          <input
            type="text"
            id="usuario"
            name="usuario"
            placeholder="Tu usuario"
            required
            autocomplete="username"
            class="w-full rounded-2xl border border-white/10 bg-slate-950/40 px-4 py-3 text-sm text-white placeholder:text-slate-400 outline-none
                   focus:border-blue-500/60 focus:ring-2 focus:ring-blue-500/30 transition"
          />
        </div>

        <!-- Contraseña -->
        <div>
          <label for="password" class="mb-2 block text-sm font-medium text-slate-200">
            Contraseña
          </label>
          <input
            type="password"
            id="password"
            name="contraseña"
            placeholder="Tu contraseña"
            required
            autocomplete="current-password"
            class="w-full rounded-2xl border border-white/10 bg-slate-950/40 px-4 py-3 text-sm text-white placeholder:text-slate-400 outline-none
                   focus:border-blue-500/60 focus:ring-2 focus:ring-blue-500/30 transition"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="mt-2 w-full rounded-2xl bg-blue-600 px-5 py-3 text-sm font-semibold text-white hover:bg-blue-500
                 focus:outline-none focus:ring-4 focus:ring-blue-500/30 transition"
        >
          Iniciar Sesión
        </button>

        <!-- Hint -->
        <p class="pt-2 text-center text-xs text-slate-400">
          Acceso restringido. Solo administradores autorizados.
        </p>

      </form>
    </div>
  </div>
</section>

{% endblock %}
