{% extends "administrador/admon.html" %}
{% block title %}Usuarios{% endblock %}

{% block content %}
<section class="relative mx-auto max-w-screen-xl px-4 py-10">

  <!-- Header -->
  <div class="flex flex-col gap-4 sm:flex-row sm:items-end sm:justify-between">
    <div>
      <h1 class="text-2xl md:text-3xl font-semibold text-white tracking-tight">Usuarios</h1>
      <p class="mt-1 text-sm text-slate-300">Listado de usuarios registrados en TeleSalud.</p>
    </div>

    <a href="{{ url_for('administrador.descargar_datos_usuarios') }}"
       class="inline-flex items-center justify-center rounded-xl bg-blue-600 px-4 py-2.5 text-sm font-semibold text-white hover:bg-blue-500 transition">
      Descargar datos
    </a>
  </div>

  <!-- Controls -->
  <div class="mt-6 grid gap-3 md:grid-cols-3">
    <div class="md:col-span-2">
      <label class="sr-only" for="searchUsers">Buscar</label>
      <input
        id="searchUsers"
        type="text"
        placeholder="Buscar por nombre, correo, teléfono, nacimiento o sexo..."
        class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder:text-slate-400 outline-none
               focus:border-blue-500/60 focus:ring-2 focus:ring-blue-500/30 transition"
      />
    </div>

    <div class="flex items-center gap-3">
      <label for="perPageUsers" class="text-sm text-slate-300 whitespace-nowrap">Por página</label>
      <select
        id="perPageUsers"
        class="w-full rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none
               focus:border-blue-500/60 focus:ring-2 focus:ring-blue-500/30 transition"
      >
        <option value="5" selected>5</option>
        <option value="10">10</option>
        <option value="20">20</option>
        <option value="50">50</option>
      </select>
    </div>
  </div>

  <!-- Table Card -->
  <div class="mt-6 overflow-hidden rounded-2xl border border-white/10 bg-white/5 backdrop-blur-xl shadow-2xl">
    <div class="overflow-x-auto">
      <table class="min-w-full divide-y divide-white/10">
        <thead class="bg-white/5">
          <tr class="text-xs font-semibold uppercase tracking-wider text-slate-300">
            <th class="px-6 py-4 text-left cursor-pointer" onclick="ordenarColumnaUsuarios(0)">Nombre</th>
            <th class="px-6 py-4 text-left cursor-pointer" onclick="ordenarColumnaUsuarios(1)">Correo</th>
            <th class="px-6 py-4 text-left cursor-pointer" onclick="ordenarColumnaUsuarios(2)">Teléfono</th>
            <th class="px-6 py-4 text-left cursor-pointer" onclick="ordenarColumnaUsuarios(3)">Nacimiento</th>
            <th class="px-6 py-4 text-left cursor-pointer" onclick="ordenarColumnaUsuarios(4)">Sexo</th>
            <th class="px-6 py-4 text-left">Acciones</th>
          </tr>
        </thead>

        <tbody id="tableBodyuser" class="divide-y divide-white/10 text-sm">
          <!-- JS inject -->
        </tbody>
      </table>
    </div>

    <!-- Footer -->
    <div class="flex flex-col gap-3 border-t border-white/10 bg-white/5 px-6 py-4 sm:flex-row sm:items-center sm:justify-between">
      <p id="tableStatusUsers" class="text-xs text-slate-400">Cargando...</p>
      <div id="paginacion" class="flex flex-wrap justify-center sm:justify-end gap-2"></div>
    </div>
  </div>
</section>

<script src="{{ url_for('static', filename='js/tablausuariosadmin.js') }}"></script>
{% endblock %}
